# Site
name: "SOTFBLOG"
title: "SoftBlog"
description: "have a nice life"
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: 'https://github.com/signofthefour/signofthefour.github.io'
include: ["_pages"]
permalink: /:title/
email: nguyentandat.social@gmail.com

# Authors
authors:
  sotf:
    name: Nguyen Tan Dat
    display_name: sotf   
    avatar: 'assets/images/avatar.png'
    gravatar: b1cc14991db7a456fcd761680bbc8f81
    email: nguyentandat.social@gmail.com
    web: https://www.signofthefour.github.io
    facebook: https://facebook.com/sotfdat
    description: "Happy guy"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-figure
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
highlighter: none
markdown: kramdown
kramdown:
   syntax_highlighter_opts:
      disable : true



# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

# Post Author Box ("enabled" or "disabled")
authorbox: "disabled"

# Sass
sass:
  sass_dir: _sass
  style: compressed

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
